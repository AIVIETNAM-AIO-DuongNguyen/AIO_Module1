# Locked core experiment matrix.
#
# `base` holds settings shared by every run; `axes` are the swept dimensions.
# The product of the axes is 3 preprocessing x 3 transfer x 3 regime x 2 dataset
# x 3 seed = 162 runs. Generate the configs with:
#
#   python scripts/generate_matrix.py --matrix configs/matrix/core.yaml \
#       --out-dir configs/core --accounts 5
#
# Keep this matrix locked. Extensions (third dataset, regime 25%, ViT-S
# robustness, CLAHE sweeps) belong in a separate spec, not here.

base:
  run:
    output_dir: runs
  data:
    resolution: 64
    root: data
    as_rgb: true
    clahe:
      clip_limit: 2.0
      tile_grid_size: 8
    augmentation:
      horizontal_flip:
        enabled: true
        p: 0.5
      vertical_flip:
        enabled: false
        p: 0.5
      rotation:
        enabled: true
        degrees: 10
  model:
    backbone: resnet50
    pretrained: true
    lora:
      rank: 8
      alpha: 16
      conv_target: kernel3
  train:
    epochs: 30
    batch_size: 64
    num_workers: 0
    optimizer:
      name: adamw
      lr: 0.001
      kwargs:
        weight_decay: 0.0001
    selection:
      monitor: auroc
      early_stopping_patience: 0
  eval:
    metrics: [auroc, accuracy, macro_f1, ece]
    split: test
    ece_bins: 15

axes:
  dataset: [pneumoniamnist, dermamnist]
  preprocessing: [p0, p_global, p_local]
  transfer: [lp, ft, lora]
  regime: [1.0, 0.10, 0.05]
  seed: [0, 1, 2]
